<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gincana Bíblica Kids</title>
    
    <!-- Bibliotecas Diretas (Estáveis) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f0f9ff;
            color: #1e293b;
            margin: 0;
            padding: 0;
        }

        .bento-card {
            border-radius: 2.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-bottom: 8px solid rgba(0,0,0,0.1);
            transition: all 0.2s ease-out;
        }
        .bento-card:active {
            transform: translateY(4px);
            border-bottom-width: 4px;
        }

        .bento-blue { background: linear-gradient(135deg, #3b82f6, #0ea5e9); border-color: #2563eb; color: white; }
        .bento-yellow { background-color: #facc15; border-color: #ca8a04; color: #713f12; }
        .bento-pink { background-color: white; border-color: #fce7f3; }
        .bento-green { background-color: #4ade80; border-color: #16a34a; color: white; }
        .bento-orange { background-color: #fb923c; border-color: #ea580c; color: white; }
        .bento-purple { background-color: white; border-color: #f3e8ff; }

        /* Animações Simples sem Framer Motion */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
            Carregando o Jogo Bíblico...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- BANCO DE DADOS EXPANDIDO ---
        const ALL_QUESTIONS = [
            // CRIAÇÃO
            { id: 'c1', category: 'Criação', difficulty: 'Fácil', text: 'Quantos dias Deus levou para criar o mundo?', options: ['3 dias', '7 dias', '6 dias'], correctAnswer: '6 dias', explanation: 'Deus criou tudo em 6 dias e descansou no sétimo.' },
            { id: 'c2', category: 'Criação', difficulty: 'Fácil', text: 'Quem foi o primeiro homem criado por Deus?', options: ['Noé', 'Abraão', 'Adão'], correctAnswer: 'Adão', explanation: 'Adão foi o primeiro, seguido por Eva.' },
            { id: 'c3', category: 'Criação', difficulty: 'Fácil', text: 'O que Deus criou no primeiro dia?', options: ['A luz', 'Os animais', 'As plantas'], correctAnswer: 'A luz', explanation: 'Deus disse: "Haja luz".' },
            { id: 'c4', category: 'Criação', difficulty: 'Fácil', text: 'Quem deu nome aos animais?', options: ['Deus', 'Adão', 'Eva'], correctAnswer: 'Adão', explanation: 'Deus trouxe os bichos para Adão nomear.' },
            { id: 'c5', category: 'Criação', difficulty: 'Fácil', text: 'Qual era o nome do jardim onde Adão e Eva moravam?', options: ['Jardim da Paz', 'Jardim do Éden', 'Jardim de Deus'], correctAnswer: 'Jardim do Éden', explanation: 'Era um lugar perfeito e lindo.' },
            { id: 'c6', category: 'Criação', difficulty: 'Fácil', text: 'A partir de que parte de Adão Deus criou Eva?', options: ['Da mão', 'Da costela', 'Do pé'], correctAnswer: 'Da costela', explanation: 'Deus fez Eva para ser a companheira de Adão.' },
            { id: 'c7', category: 'Criação', difficulty: 'Fácil', text: 'O que aconteceu no 7º dia?', options: ['Deus dormiu', 'Deus descansou', 'Teve chuva'], correctAnswer: 'Deus descansou', explanation: 'Ele santificou o dia de descanso.' },
            { id: 'c8', category: 'Criação', difficulty: 'Fácil', text: 'Qual animal enganou Eva no jardim?', options: ['Leão', 'Serpente', 'Lobo'], correctAnswer: 'Serpente', explanation: 'A serpente era a mais astuta das criaturas.' },
            { id: 'c9', category: 'Criação', difficulty: 'Médio', text: 'O que Deus criou no QUARTO dia?', options: ['Aves', 'Sol, Lua e Estrelas', 'Peixes', 'Homem'], correctAnswer: 'Sol, Lua e Estrelas', explanation: 'Ele criou os luminares do céu.' },
            { id: 'c10', category: 'Criação', difficulty: 'Médio', text: 'Em que dia Deus criou o homem?', options: ['5º dia', '6º dia', '7º dia', '4º dia'], correctAnswer: '6º dia', explanation: 'No último dia da criação animal.' },

            // JESUS
            { id: 'j1', category: 'Histórias de Jesus', difficulty: 'Fácil', text: 'Onde Jesus nasceu?', options: ['Jerusalém', 'Belém', 'Nazaré'], correctAnswer: 'Belém', explanation: 'Nasceu em uma manjedoura simples.' },
            { id: 'j2', category: 'Histórias de Jesus', difficulty: 'Fácil', text: 'Quantos discípulos Jesus tinha?', options: ['10', '12', '7'], correctAnswer: '12', explanation: 'Ele escolheu 12 apóstolos.' },
            { id: 'j3', category: 'Histórias de Jesus', difficulty: 'Fácil', text: 'Quem era a mãe de Jesus?', options: ['Maria', 'Marta', 'Isabel'], correctAnswer: 'Maria', explanation: 'Maria foi a escolhida de Deus.' },
            { id: 'j4', category: 'Histórias de Jesus', difficulty: 'Fácil', text: 'Com o que Jesus alimentou a multidão?', options: ['Pão e Peixe', 'Maçãs', 'Uvas'], correctAnswer: 'Pão e Peixe', explanation: '5 pães e 2 peixinhos!' },
            { id: 'j5', category: 'Histórias de Jesus', difficulty: 'Fácil', text: 'Jesus caminhou sobre o quê?', options: ['Areia', 'Água', 'Nuvens'], correctAnswer: 'Água', explanation: 'Ele caminhou no mar durante a tempestade.' },
            { id: 'j6', category: 'Histórias de Jesus', difficulty: 'Fácil', text: 'Quem batizou Jesus?', options: ['Pedro', 'João Batista', 'Tiago'], correctAnswer: 'João Batista', explanation: 'No Rio Jordão.' },
            { id: 'j7', category: 'Histórias de Jesus', difficulty: 'Fácil', text: 'Qual era a profissão de José, o pai de Jesus na terra?', options: ['Pescador', 'Carpinteiro', 'Pastor'], correctAnswer: 'Carpinteiro', explanation: 'Jesus ajudava José no trabalho.' },
            { id: 'j8', category: 'Histórias de Jesus', difficulty: 'Fácil', text: 'Quem Jesus ressuscitou depois de 4 dias?', options: ['Lázaro', 'Bartimeu', 'Zaqueu'], correctAnswer: 'Lázaro', explanation: 'Jesus disse: "Lázaro, vem para fora!".' },
            { id: 'j9', category: 'Histórias de Jesus', difficulty: 'Médio', text: 'Qual foi o primeiro milagre de Jesus?', options: ['Curar cego', 'Transformar água em vinho', 'Caminhar no mar'], correctAnswer: 'Transformar água em vinho', explanation: 'Aconteceu em um casamento em Caná.' },
            { id: 'j10', category: 'Histórias de Jesus', difficulty: 'Médio', text: 'Onde Jesus foi tentado por 40 dias?', options: ['No barco', 'No templo', 'No deserto'], correctAnswer: 'No deserto', explanation: 'Ele ficou lá em jejum e oração.' },

            // HERÓIS
            { id: 'h1', category: 'Heróis da Fé', difficulty: 'Fácil', text: 'Quem construiu a arca?', options: ['Noé', 'Abraão', 'Davi'], correctAnswer: 'Noé', explanation: 'Noé salvou sua família e os animais.' },
            { id: 'h2', category: 'Heróis da Fé', difficulty: 'Fácil', text: 'Quem venceu o gigante Golias?', options: ['Sansão', 'Davi', 'Salomão'], correctAnswer: 'Davi', explanation: 'Davi usou apenas uma pedra e sua fé.' },
            { id: 'h3', category: 'Heróis da Fé', difficulty: 'Fácil', text: 'Quem tinha muita força no cabelo?', options: ['Davi', 'Sansão', 'Elias'], correctAnswer: 'Sansão', explanation: 'Sua força vinha de Deus através do voto.' },
            { id: 'h4', category: 'Heróis da Fé', difficulty: 'Fácil', text: 'Quem foi jogado na cova dos leões?', options: ['José', 'Daniel', 'Gideão'], correctAnswer: 'Daniel', explanation: 'Deus fechou a boca dos leões.' },
            { id: 'h5', category: 'Heróis da Fé', difficulty: 'Fácil', text: 'Quem abriu o Mar Vermelho?', options: ['Josué', 'Moisés', 'Noé'], correctAnswer: 'Moisés', explanation: 'O povo atravessou em solo seco.' },
            { id: 'h6', category: 'Heróis da Fé', difficulty: 'Fácil', text: 'Quem recebeu os 10 Mandamentos?', options: ['Davi', 'Moisés', 'Samuel'], correctAnswer: 'Moisés', explanation: 'Deus deu a lei no Monte Sinai.' },
            { id: 'h7', category: 'Heróis da Fé', difficulty: 'Fácil', text: 'Quem foi vendido pelos irmãos mas virou governador?', options: ['Benjamin', 'José', 'Ruben'], correctAnswer: 'José', explanation: 'José virou governador do Egito.' },
            { id: 'h8', category: 'Heróis da Fé', difficulty: 'Fácil', text: 'Quem é conhecido como o "Pai da Fé"?', options: ['Abraão', 'Adão', 'Noé'], correctAnswer: 'Abraão', explanation: 'Pois confiou em Deus para tudo.' },
            { id: 'h9', category: 'Heróis da Fé', difficulty: 'Médio', text: 'Qual profeta foi levado ao céu num redemoinho?', options: ['Elias', 'Eliseu', 'Daniel'], correctAnswer: 'Elias', explanation: 'Com um carro de fogo!' },
            { id: 'h10', category: 'Heróis da Fé', difficulty: 'Médio', text: 'Quantas voltas o povo deu em Jericó no último dia?', options: ['1 volta', '7 voltas', '3 voltas'], correctAnswer: '7 voltas', explanation: 'E os muros caíram!' }
        ];

        function App() {
            const [view, setView] = useState('home'); // home, quiz, results
            const [selectedCategory, setSelectedCategory] = useState('Criação');
            const [difficulty, setDifficulty] = useState('Fácil');
            const [quizQuestions, setQuizQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [highScore, setHighScore] = useState(0);
            const [showAd, setShowAd] = useState(true);
            const [timer, setTimer] = useState(5);

            useEffect(() => {
                const saved = localStorage.getItem('biblical_highscore');
                if (saved) setHighScore(parseInt(saved));

                const countdown = setInterval(() => {
                    setTimer(t => (t > 0 ? t - 1 : 0));
                }, 1000);
                return () => clearInterval(countdown);
            }, []);

            const startQuiz = () => {
                const filtered = ALL_QUESTIONS.filter(q => q.category === selectedCategory && q.difficulty === difficulty);
                // Embaralha e pega 8 perguntas (ou todas se tiver menos de 8)
                const shuffled = [...filtered].sort(() => Math.random() - 0.5).slice(0, 8);
                setQuizQuestions(shuffled);
                setCurrentIndex(0);
                setScore(0);
                setFeedback(null);
                setView('quiz');
            };

            const handleAnswer = (opt) => {
                if (feedback) return;
                const correct = opt === quizQuestions[currentIndex].correctAnswer;
                if (correct) setScore(s => s + 10);
                setFeedback({ correct, explanation: quizQuestions[currentIndex].explanation });
            };

            const nextStep = () => {
                if (currentIndex + 1 < quizQuestions.length) {
                    setCurrentIndex(i => i + 1);
                    setFeedback(null);
                } else {
                    if (score > highScore) {
                        setHighScore(score);
                        localStorage.setItem('biblical_highscore', score.toString());
                    }
                    setView('results');
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 animate-fade">
                    {/* Header */}
                    <div className="max-w-4xl mx-auto flex justify-between items-center mb-8">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-yellow-400 rounded-full flex items-center justify-center text-2xl shadow-md border-4 border-white">📖</div>
                            <h1 className="text-2xl font-black text-sky-600 uppercase leading-none">Pequenos<br/>Discípulos</h1>
                        </div>
                        <div className="bg-white px-5 py-2 rounded-full border-4 border-sky-100 shadow-sm font-black text-sky-700">
                            ⭐ {highScore}
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="max-w-4xl mx-auto">
                        {view === 'home' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bento-card bento-blue p-8 md:col-span-2 flex flex-col justify-center min-h-[300px]">
                                    <h2 className="text-4xl md:text-6xl font-black mb-4 uppercase">Bora Jogar?</h2>
                                    <p className="text-xl mb-8 opacity-90">Escolha uma categoria abaixo e responda 8 perguntas!</p>
                                    <button onClick={startQuiz} className="bg-yellow-400 hover:bg-yellow-300 text-yellow-900 font-black text-2xl py-5 rounded-2xl shadow-[0_6px_0_0_#ca8a04] active:scale-95 transition-all">
                                        COMEÇAR O DESAFIO! 🚀
                                    </button>
                                </div>

                                <div className="bento-card bento-purple p-6">
                                    <h3 className="font-black text-purple-600 uppercase mb-4">Dificuldade</h3>
                                    <div className="flex gap-4">
                                        {['Fácil', 'Médio'].map(d => (
                                            <button key={d} onClick={() => setDifficulty(d)} className={`flex-1 p-4 rounded-xl border-4 font-black transition-all ${difficulty === d ? 'border-purple-400 bg-purple-50 text-purple-700' : 'border-slate-100 text-slate-400'}`}>
                                                {d}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bento-card bg-white p-6 md:row-span-1 border-4 border-slate-100">
                                    <h3 className="font-black text-slate-400 uppercase mb-4">Categorias</h3>
                                    <div className="grid grid-cols-1 gap-3">
                                        {['Criação', 'Histórias de Jesus', 'Heróis da Fé'].map(cat => (
                                            <button key={cat} onClick={() => setSelectedCategory(cat)} className={`p-4 rounded-xl border-4 font-black text-left transition-all ${selectedCategory === cat ? 'border-sky-400 bg-sky-50 text-sky-700' : 'border-slate-50 text-slate-400'}`}>
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'quiz' && (
                            <div className="animate-fade">
                                <div className="flex justify-between mb-4 font-black text-sky-400 uppercase text-sm">
                                    <span>Pergunta {currentIndex + 1} de {quizQuestions.length}</span>
                                    <span className="text-orange-500">Pontos: {score}</span>
                                </div>
                                <div className="w-full bg-slate-200 h-4 rounded-full mb-8 overflow-hidden">
                                    <div className="bg-sky-400 h-full transition-all duration-500" style={{ width: `${((currentIndex + 1) / quizQuestions.length) * 100}%` }}></div>
                                </div>

                                <div className="bento-card bg-white p-10 text-center mb-6 border-4 border-slate-100">
                                    <h2 className="text-3xl font-black text-slate-800">{quizQuestions[currentIndex].text}</h2>
                                </div>

                                <div className="grid gap-4">
                                    {quizQuestions[currentIndex].options.map((opt, i) => (
                                        <button key={i} onClick={() => handleAnswer(opt)} className={`bento-card bg-white p-6 text-left font-black text-xl flex items-center gap-4 ${feedback ? (opt === quizQuestions[currentIndex].correctAnswer ? 'bg-green-400 text-white' : 'opacity-30') : 'hover:bg-sky-50'}`}>
                                            <span className="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center text-slate-400">{i + 1}</span>
                                            {opt}
                                        </button>
                                    ))}
                                </div>

                                {feedback && (
                                    <div className={`mt-8 bento-card p-8 animate-fade ${feedback.correct ? 'bento-green' : 'bento-orange'}`}>
                                        <h4 className="text-3xl font-black uppercase mb-2">{feedback.correct ? 'Correto! 🎉' : 'Quase lá...'}</h4>
                                        <p className="text-lg font-bold mb-6 opacity-90">{feedback.explanation}</p>
                                        <button onClick={nextStep} className="w-full bg-white text-slate-900 font-black py-4 rounded-xl shadow-lg">PRÓXIMA PERGUNTA</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'results' && (
                            <div className="text-center animate-fade">
                                <div className="text-8xl mb-4">🏆</div>
                                <h2 className="text-5xl font-black text-sky-600 mb-8 uppercase">Fim de Jogo!</h2>
                                <div className="bento-card bento-yellow p-12 mb-8">
                                    <div className="text-8xl font-black">{score}</div>
                                    <p className="text-2xl font-black uppercase opacity-70">Pontos Marcados</p>
                                </div>
                                <button onClick={() => setView('home')} className="w-full bg-orange-400 py-6 rounded-3xl text-white font-black text-2xl shadow-xl active:scale-95 transition-all">
                                    JOGAR NOVAMENTE 🔄
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Anúncio Flutuante Corrigido */}
                    {showAd && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-md overflow-hidden animate-fade">
                                <div className="bg-orange-500 p-6 text-center text-white">
                                    <h3 className="text-2xl font-black uppercase">Oferta para Você! 🎁</h3>
                                </div>
                                <div className="p-8">
                                    <a href="https://s.shopee.com.br/901ZjWq5Gd" target="_blank" className="block text-center group">
                                        <div className="aspect-square bg-slate-100 rounded-3xl overflow-hidden mb-4 border-4 border-white shadow-inner">
                                            <img src="https://down-br.img.susercontent.com/file/sg-11134201-7reog-m8ga35ia06j94b" className="w-full h-full object-cover group-hover:scale-110 transition-transform" />
                                        </div>
                                        <h4 className="font-black text-xl text-slate-800 line-clamp-2">Quebra-Cabeça Jesus 20 peças MDF</h4>
                                        <div className="text-3xl font-black text-orange-600 mt-2">R$ 22,71</div>
                                    </a>
                                    <div className="mt-8 space-y-3">
                                        <a href="https://s.shopee.com.br/901ZjWq5Gd" target="_blank" className="block w-full bg-orange-500 py-4 rounded-2xl text-white font-black text-center shadow-lg active:scale-95 transition-all">
                                            QUERO NA SHOPEE! 🛍️
                                        </a>
                                        <button disabled={timer > 0} onClick={() => setShowAd(false)} className={`w-full py-4 font-black transition-all ${timer > 0 ? 'text-slate-300' : 'text-slate-400 hover:text-slate-600'}`}>
                                            {timer > 0 ? `Fechar em ${timer}s` : 'FECHAR ANÚNCIO'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
